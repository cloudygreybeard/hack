name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    uses: cloudygreybeard/homebrew-tap/.github/workflows/release-homebrew-formula.yml@main
    with:
      package-name: hack
      binary-name: hack
      formula-class: Hack
      formula-desc: "CLI tool for managing hack workspaces with pattern-based scaffolding"
      artifact-style: goreleaser
      private: false
      custom-caveats: |-
        To enable shell integration, run:
          hack bootstrap --install
    secrets:
      deploy-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
